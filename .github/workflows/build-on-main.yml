name: 'Build & Tag'

on:
  push:
    branches: [main]

permissions:
  contents: 'write'

jobs:
  check:
    uses: zenhelix/ci-workflows/.github/workflows/gradle-plugin-check.yml@v3
    with:
      java-version: '17'

  create-tag:
    needs: check
    uses: zenhelix/ci-workflows/.github/workflows/gradle-create-tag.yml@v3
    with:
      java-version: '17'
    secrets: inherit
